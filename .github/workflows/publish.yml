name: Publish npm package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Verify stable tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
          if [[ "${package_version}" == *-* ]]; then
            echo "::error::Prerelease versions must use the documented manual dist-tag flow and cannot run the stable publish workflow."
            exit 1
          fi

      - name: Verify release commit is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run check

      - name: Preview package contents
        run: npm pack --dry-run

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Verify release commit is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Check whether this version already exists
        id: registry
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish with npm trusted publishing
        if: steps.registry.outputs.exists != 'true'
        run: npm publish --ignore-scripts
